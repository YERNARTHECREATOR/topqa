<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Топқа бөлу</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #5bbcf7 0%, #2e8fd6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      max-width: 700px;
      width: 100%;
    }

    .card {
      position: relative;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease;
      aspect-ratio: 1.3 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card:hover  { transform: scale(1.08) translateY(-3px); }
    .card:active { transform: scale(0.95); }

    .cloud-emoji {
      position: absolute;
      inset: 0;
      font-size: clamp(70px, 14vw, 100px);
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 6px;
      filter: drop-shadow(0 5px 8px rgba(20,60,140,0.22));
    }

    .card-label {
      position: relative;
      z-index: 2;
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      padding: 0 8px;
      padding-bottom: 4px;
    }

    .card-label.num  { font-size: clamp(22px, 5vw, 32px); color: #1a4d9e; }
    .card-label.text { font-size: clamp(10px, 2.5vw, 14px); }

    .group-жасыл .card-label.text { color: #1e7a1e; }
    .group-таза  .card-label.text { color: #0a4d8a; }
    .group-эко   .card-label.text { color: #7a5500; }
  </style>
</head>
<body>

<div class="grid" id="grid"></div>

<script>
  // Перемешаны поочерёдно: жасыл×5, таза×5, эко×6
  const cards = [
    { group: "жасыл", label: "Жасыл сақшылар" }, // 1
    { group: "таза",  label: "Таза әлем" },        // 2
    { group: "эко",   label: "Экодостар" },         // 3
    { group: "жасыл", label: "Жасыл сақшылар" }, // 4
    { group: "таза",  label: "Таза әлем" },        // 5
    { group: "эко",   label: "Экодостар" },         // 6
    { group: "жасыл", label: "Жасыл сақшылар" }, // 7
    { group: "таза",  label: "Таза әлем" },        // 8
    { group: "эко",   label: "Экодостар" },         // 9
    { group: "жасыл", label: "Жасыл сақшылар" }, // 10
    { group: "таза",  label: "Таза әлем" },        // 11
    { group: "эко",   label: "Экодостар" },         // 12
    { group: "жасыл", label: "Жасыл сақшылар" }, // 13
    { group: "таза",  label: "Таза әлем" },        // 14
    { group: "эко",   label: "Экодостар" },         // 15
    { group: "эко",   label: "Экодостар" },         // 16
  ];

  const grid = document.getElementById("grid");

  cards.forEach((data, i) => {
    const card = document.createElement("div");
    card.className = "card";

    const cloud = document.createElement("div");
    cloud.className = "cloud-emoji";
    cloud.textContent = "☁️";

    const label = document.createElement("div");
    label.className = "card-label num";
    label.textContent = i + 1;

    card.appendChild(cloud);
    card.appendChild(label);

    card.onclick = () => {
      if (card.dataset.opened) return;
      card.dataset.opened = "1";
      card.classList.add("group-" + data.group);
      label.className = "card-label text";
      label.textContent = data.label;
    };

    grid.appendChild(card);
  });
</script>
</body>
</html>
