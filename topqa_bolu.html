<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Топқа бөлу</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #5bbcf7 0%, #2e8fd6 100%);
    }

    h1 {
      text-align: center;
      padding: 22px 0 10px;
      font-size: 22px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 10px rgba(0,50,120,0.2);
      letter-spacing: 0.5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      max-width: 420px;
      margin: 0 auto;
      padding: 10px 16px 30px;
    }

    .card {
      position: relative;
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease;
      aspect-ratio: 1 / 0.85;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card:hover  { transform: scale(1.08) translateY(-3px); }
    .card:active { transform: scale(0.95); }

    .cloud-emoji {
      position: absolute;
      inset: 0;
      font-size: clamp(80px, 22vw, 110px);
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 8px;
      filter: drop-shadow(0 6px 10px rgba(20,60,140,0.25));
    }

    .card-label {
      position: relative;
      z-index: 2;
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
      padding: 0 8px;
      padding-bottom: 4px;
    }

    .card-label.num  { font-size: clamp(24px, 7vw, 36px); color: #1a4d9e; }
    .card-label.text { font-size: clamp(11px, 3.5vw, 15px); }

    .group-жасыл .card-label.text { color: #1e7a1e; }
    .group-таза  .card-label.text { color: #0a4d8a; }
    .group-эко   .card-label.text { color: #7a5500; }
  </style>
</head>
<body>

<h1>Tap one to open</h1>
<div class="grid" id="grid"></div>

<script>
  const cards = [
    { group: "жасыл", label: "Жасыл сақшылар" },
    { group: "жасыл", label: "Жасыл сақшылар" },
    { group: "жасыл", label: "Жасыл сақшылар" },
    { group: "жасыл", label: "Жасыл сақшылар" },
    { group: "жасыл", label: "Жасыл сақшылар" },
    { group: "жасыл", label: "Жасыл сақшылар" },
    { group: "таза",  label: "Таза әлем" },
    { group: "таза",  label: "Таза әлем" },
    { group: "таза",  label: "Таза әлем" },
    { group: "эко",   label: "Экодостар" },
    { group: "эко",   label: "Экодостар" },
    { group: "эко",   label: "Экодостар" },
    { group: "эко",   label: "Экодостар" },
    { group: "эко",   label: "Экодостар" },
    { group: "эко",   label: "Экодостар" },
    { group: "эко",   label: "Экодостар" },
  ];

  const grid = document.getElementById("grid");

  cards.forEach((data, i) => {
    const card = document.createElement("div");
    card.className = "card";

    const cloud = document.createElement("div");
    cloud.className = "cloud-emoji";
    cloud.textContent = "☁️";

    const label = document.createElement("div");
    label.className = "card-label num";
    label.textContent = i + 1;

    card.appendChild(cloud);
    card.appendChild(label);

    card.onclick = () => {
      if (card.dataset.opened) return;
      card.dataset.opened = "1";
      card.classList.add("group-" + data.group);
      label.className = "card-label text";
      label.textContent = data.label;
    };

    grid.appendChild(card);
  });
</script>
</body>
</html>
